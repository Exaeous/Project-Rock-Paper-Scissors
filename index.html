<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="title">A Rock Paper Scissors Game</h1>
    <div class="human-score-title">
      Human Score:
      <span class="human-score">0</span>
    </div>
    <div class="computer-score-title">
      Computer Score:
      <span class="computer-score">0</span>
    </div>
    <button class="rock-btn">Rock</button>
    <button class="paper-btn">Paper</button>
    <button class="scissors-btn">Scissors</button>
    <button class="reset-btn">Reset</button>
    <div class="current-result"></div>
    <div class="final-result"></div>
    <script src="script.js"></script>
  </body>
</html>
